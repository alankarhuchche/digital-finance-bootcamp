# --- Google Cloud / Firestore ---
# Set your real project id via env var at runtime (GCP_PROJECT_ID), never hardcode it here.
quarkus.google.cloud.project-id=${GCP_PROJECT_ID:CHANGE_ME}

# --- HTTP ---
quarkus.http.port=8080

# In dev mode, Vite runs on :5173 and proxies /api to this port (see frontend/vite.config.ts).
%dev.quarkus.http.port=8080

# --- App metadata ---
quarkus.application.name=digital-finance-bootcamp
quarkus.application.version=1.0.0-SNAPSHOT

# --- Mailer (contact form) ---
# Gmail SMTP via an App Password, not your real account password.
# Generate one at https://myaccount.google.com/apppasswords (requires 2FA enabled).
# Set these as real environment variables / Cloud Run secrets — never hardcode them.
quarkus.mailer.from=${MAILER_USERNAME:CHANGE_ME@gmail.com}
quarkus.mailer.host=smtp.gmail.com
quarkus.mailer.port=587
quarkus.mailer.start-tls=REQUIRED
quarkus.mailer.username=${MAILER_USERNAME:CHANGE_ME@gmail.com}
quarkus.mailer.password=${MAILER_PASSWORD:CHANGE_ME_APP_PASSWORD}

# --- Gemini API ---
gemini.api-key=${GEMINI_API_KEY:}
gemini.model=${GEMINI_MODEL:gemini-2.5-flash}
